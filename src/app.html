<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="author" content="Cornelius Ardhani Yoga Pratama" />
		<script>
			(() => {
				try {
					const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const root = document.documentElement;
					root.classList.toggle('dark', dark);
					root.style.backgroundColor = dark ? 'rgb(3, 7, 18)' : 'white';
					root.style.colorScheme = dark ? 'dark' : 'light';
				} catch {
					// Keep the default light background if the preference check is unavailable.
				}
			})();
		</script>

		<!-- DNS Prefetch & Preconnect -->
		<link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
		<link rel="dns-prefetch" href="https://fonts.googleapis.com" />
		<link rel="dns-prefetch" href="https://fonts.gstatic.com" />
		<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
		<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<!-- Preload Critical Resources -->
		<link
			rel="preload"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
			as="style"
			onload="this.onload=null;this.rel='stylesheet'"
		/>
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
				rel="stylesheet"
			/>
		</noscript>
		<style>
			:root {
				background: white;
				color-scheme: light;
			}
			:root.dark {
				background: rgb(3, 7, 18);
				color-scheme: dark;
			}
			html,
			body {
				margin: 0;
				background: inherit;
			}
			body {
				font-family:
					Inter,
					system-ui,
					-apple-system,
					sans-serif;
				opacity: 0;
				animation: fadeIn 0.3s forwards;
			}
			@keyframes fadeIn {
				to {
					opacity: 1;
				}
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="viewport">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
